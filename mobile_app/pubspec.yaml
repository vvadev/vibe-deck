name: vibe_deck_mobile
description: "Mobile controller for Vibe Deck"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/vibe-deck-logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/vibe-deck-logo.png
  remove_alpha_ios: true
